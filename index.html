<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>林旻燕 | 個人履歷</title>
    <style>
        /* 1. 整體色調：低飽和度灰藍色漸層背景 */
        body { 
            font-family: "Noto Sans TC", "Microsoft JhengHei", sans-serif; 
            line-height: 2; 
            color: #4a4a4a; /* 深灰文字，比純黑柔和 */
            max-width: 900px; 
            margin: 0 auto; 
            padding: 60px 20px; 
            background: linear-gradient(135deg, #f0f4f8 0%, #b0c4de 100%); /* 低飽和度灰藍漸層 */
            text-align: center; /* 全域字體置中 */
        }

        /* 2. 履歷卡片：柔和莫蘭迪質感 */
        .resume-container {
            background-color: #ffffff;
            padding: 60px 40px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05); /* 輕微柔和陰影 */
            border: 1px solid #e9ecef;
            position: relative;
            overflow: hidden;
        }
        
        /* 3. 頂部飾條：藕粉與霧藍漸層 */
        .resume-container::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 8px;
            background: linear-gradient(90deg, #db7093 0%, #b0c4de 100%); /* 藕粉與霧藍漸層 */
        }

        /* 4. 頂部名字 */
        header { 
            margin-bottom: 50px; 
        }
        h1 { 
            color: #2c3e50; 
            margin: 0; 
            font-size: 2.8em; 
            letter-spacing: 10px; 
            font-weight: 900;
        }
        
        /* 5. 置中式標題設計：低飽和度灰藍色 */
        h2 { 
            color: #2c3e50; 
            font-size: 1.5em; 
            display: inline-block;
            padding: 5px 20px;
            margin-top: 40px; 
            margin-bottom: 25px; 
            border-bottom: 3px solid #b0c4de; /* 霧藍色底線裝飾 */
            letter-spacing: 2px;
        }
        
        .content { 
            margin-bottom: 30px; 
            display: flex;
            flex-direction: column;
            align-items: center; /* 內容物置中 */
        }
        
        /* 6. 專題標題：莫蘭迪藕粉色強調 */
        .project-title { 
            font-weight: bold; 
            color: #db7093; /* 已改為藕粉色 */
            font-size: 1.3em; 
            margin-bottom: 10px;
        }

        .project-desc {
            max-width: 650px;
            margin: 0 auto;
            color: #666;
            text-align: justify; /* 文字對齊 */
        }
        
        /* 7. 莫蘭迪標籤：繽紛但去除了刺眼 */
        .tag-box { 
            margin-top: 25px; 
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 12px;
        }
        
        .tag { 
            padding: 5px 20px; 
            border-radius: 50px; 
            font-size: 0.95em; 
            font-weight: bold; 
            transition: 0.3s;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }

        /* 莫蘭迪繽紛顏色分配 */
        .tag-blue { background: #e1f5fe; color: #2980b9; border: 1px solid #b3e5fc; } /* 灰藍 */
        .tag-green { background: #dcfce7; color: #166534; border: 1px solid #b3e5fc; } /* 霧綠 */
        .tag-yellow { background: #fef3c7; color: #92400e; border: 1px solid #b3e5fc; } /* 煙燻棕 */
        .tag-purple { background: #f3e8ff; color: #6b21a8; border: 1px solid #b3e5fc; } /* 煙燻紫 */

        .tag:hover {
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        /* 8. 聯絡方式：質感淺灰藍區塊 */
        footer {
            margin-top: 60px;
            padding: 40px;
            background-color: #f1f4f8; /* 淺灰藍底色 */
            color: #2c3e50;
            border-radius: 15px;
            border: 1px dashed #b0c4de;
            text-align: center;
        }
        .footer-title { 
            font-weight: bold; 
            font-size: 1.2em; 
            margin-bottom: 15px; 
            color: #2980b9; 
            letter-spacing: 2px;
        }
