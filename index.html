<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>林旻燕</title>
    <style>
        :root {
            --very-peri: #4A4B96;   /* 深長春花藍 */
            --orchid-bloom: #9D7BA8; /* 深蘭花紫 */
            --clear-sky: #5F8BB0;    /* 深淨空藍 */
            --pure-black: #1A1A1A;   /* 近純黑字體，確保清晰 */
            --content-gray: #333333; /* 內容深灰色 */
        }

        body { 
            font-family: "Noto Sans TC", "Microsoft JhengHei", sans-serif; 
            line-height: 2; 
            color: var(--pure-black); 
            max-width: 850px; 
            margin: 0 auto; 
            padding: 50px 20px; 
            background-color: #FFFFFF;
            text-align: center;
        }

        /* 強化邊框與陰影，讓界線明確 */
        .resume-container {
            background-color: #ffffff;
            padding: 50px 60px;
            border-radius: 12px;
            box-shadow: 0 10px 50px rgba(0, 0, 0, 0.12); 
            border: 2px solid #E1E4E8;
            position: relative;
        }
        
        /* 名字 */
        header { margin-bottom: 40px; }
        h1 { 
            color: var(--very-peri); 
            margin: 0; 
            font-size: 3em; 
            letter-spacing: 12px; 
            font-weight: 900;
        }
        
        /* 標題：加粗加深 */
        h2 { 
            font-size: 1.6em; 
            display: inline-block;
            padding: 0 20px 8px;
            margin-top: 40px; 
            margin-bottom: 25px; 
            letter-spacing: 6px;
            color: var(--very-peri);
            border-bottom: 4px solid var(--orchid-bloom); 
            font-weight: 900;
        }
        
        .content { 
            margin-bottom: 30px; 
            font-size: 1.15em;
            font-weight: 500;
            color: var(--content-gray);
        }
        
        /* 專題標題：絕對黑色 */
        .project-title { 
            font-weight: 900; 
            color: #000000; 
            font-size: 1.5em; 
            margin-bottom: 10px;
        }

        .project-desc {
            max-width: 680px;
            margin: 15px auto;
            color: #222222;
            text-align: justify;
            font-size: 1.05em;
            line-height: 1.9;
        }
        
        /* 標籤：背景加深，字體改為深色 */
        .tag-box { 
            margin-top: 25px; 
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 15px;
        }
        
        .tag { 
            background: #E8F0F7; /* 淺藍背景 */
            color: #2C4A63;      /* 深藍文字，確保極高對比度 */
            padding: 8px 25px; 
            border-radius: 8px; 
            font-size: 1em; 
            font-weight: 900;    /* 標籤字體加到最粗 */
            border: 2px solid var(--clear-sky);
        }

        /* 聯絡資訊 */
        footer {
            margin-top: 50px;
            padding: 40px;
            background-color: #F0F4F8; 
            border-radius: 12px;
            border: 2px solid var(--very-peri);
        }

        .footer-title { 
            font-weight: 900; 
            font-size: 1.3em; 
            margin-bottom: 15px; 
            color: var(--very-peri);
        }

        .footer-text { 
            font-size: 1.2em;
            color: #000000;
            font-weight: 700;
        }

        strong { color: #000; font-weight: 900; }
    </style>
</head>
<body>

    <div class="resume-container">
        <header>
            <h1>林
